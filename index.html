<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>침묵의 항로</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <section id="home" class="home">
    <div class="homeShade"></div>
    <main class="homeBox">
      <p class="overline">MIDNIGHT OCEAN CRUISE</p>
      <h1>침묵의 항로</h1>
      <p class="sub">SILENT ROUTE</p>
      <div class="videoFrame">
        <video src="trailer.mp4" controls muted playsinline poster="assets/hero-cruise.jpg"></video>
      </div>
      <div class="homeBtns">
        <button id="newGame" class="btn primary">사건 조사 시작</button>
        <button id="continueGame" class="btn">저장 기록 불러오기</button>
        <button id="wipeGame" class="btn danger">기록 초기화</button>
      </div>
    </main>
  </section>

  <section id="game" class="game hidden">
    <header class="top">
      <div>
        <h2 id="placeTitle">갑판</h2>
        <p id="placeGoal">촬영 기록 배열</p>
      </div>
      <div class="progressBox">
        <span id="progressText">0%</span>
        <div class="bar"><div id="progressBar"></div></div>
      </div>
      <div class="topBtns">
        <button id="rebuildBtn" class="btn small hidden">보고서 작성</button>
        <button id="homeBtn" class="btn small">표지</button>
      </div>
    </header>

    <main class="layout">
      <aside class="panel">
        <h3>수집 기록</h3>
        <div id="inventory" class="scroll"></div>
      </aside>

      <section class="stageWrap">
        <div id="stage" class="stage">
          <img id="placeImage" class="placeImage" src="" alt="" />
          <div id="hotspots"></div>
        </div>
        <footer class="bottom">
          <nav id="placeNav"></nav>
          <button id="puzzleBtn" class="btn primary">잠금 장치 확인</button>
        </footer>
      </section>

      <aside class="panel">
        <h3>사건 노트</h3>
        <div id="notes" class="scroll"></div>
      </aside>
    </main>
  </section>

  <section id="ending" class="ending hidden">
    <div class="endingBox">
      <img id="endingImg" src="" alt="" />
      <h2 id="endingTitle">송신 완료</h2>
      <p id="endingText">항로 잠금 해제</p>
      <div>
        <button id="backToGame" class="btn">기록으로 돌아가기</button>
        <button id="endingHome" class="btn primary">처음으로</button>
      </div>
    </div>
  </section>

  <div id="imageModal" class="modal hidden">
    <div class="dim" data-close="imageModal"></div>
    <div class="modalBox imageBox">
      <button class="x" data-close="imageModal">×</button>
      <h2 id="imageTitle"></h2>
      <img id="imageFull" src="" alt="" />
      <p id="imageCaption"></p>
    </div>
  </div>

  <div id="puzzleModal" class="modal hidden">
    <div class="dim"></div>
    <div class="modalBox puzzleBox">
      <button id="closePuzzle" class="x">×</button>
      <div id="puzzleRoot"></div>
    </div>
  </div>

  <div id="toast" class="toast hidden">기록 추가</div>
  <script src="script.js"></script>
</body>
</html>
